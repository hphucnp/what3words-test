services:
  emergencyapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: what3words-test:latest
    container_name: emergencyapi
    ports:
      - "8080:8080"
    environment:
      WHAT3WORDS_API_BASE_URL: https://api.what3words.com/v3
      WHAT3WORDS_API_KEY: ${WHAT3WORDS_API_KEY}
      SERVER_PORT: 8080
    restart: unless-stopped
