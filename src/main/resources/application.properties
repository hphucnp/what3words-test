server.port=${SERVER_PORT:8080}

what3words.api.base-url=${WHAT3WORDS_API_BASE_URL:https://api.what3words.com/v3}
what3words.api.key=${WHAT3WORDS_API_KEY:}
what3words.api.connect-timeout-millis=${WHAT3WORDS_CONNECT_TIMEOUT_MILLIS:2000}
what3words.api.read-timeout-millis=${WHAT3WORDS_READ_TIMEOUT_MILLIS:3000}
what3words.api.retry-max-attempts=${WHAT3WORDS_RETRY_MAX_ATTEMPTS:3}
what3words.api.retry-backoff-millis=${WHAT3WORDS_RETRY_BACKOFF_MILLIS:200}
what3words.api.circuit-breaker-failure-threshold=${WHAT3WORDS_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
what3words.api.circuit-breaker-open-millis=${WHAT3WORDS_CIRCUIT_BREAKER_OPEN_MILLIS:15000}
